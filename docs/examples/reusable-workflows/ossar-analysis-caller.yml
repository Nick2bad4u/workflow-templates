# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json

name: "Ossar Security Analysis"

run-name: "${{ github.workflow }} (${{ github.ref_name || github.run_id }})"

on:
    schedule:
        - cron: "41 10 * * 1"
    push:
        branches:
            - "main"
            - "master"
    pull_request:
        branches:
            - "main"
            - "master"
    merge_group:
        branches:
            - "main"
            - "master"
        types:
            - "checks_requested"
    workflow_dispatch:

concurrency:
    group: "ossar-analysis-${{ github.workflow }}-${{ github.ref || github.run_id }}"
    cancel-in-progress: true

permissions: {}

jobs:
    ossar-analysis:
        name: "Ossar Security Analysis"
        permissions:
            actions: "read"
            contents: "read"
            security-events: "write"
        uses: "Nick2bad4u/workflow-templates/.github/workflows/reusable-ossar-analysis.yml@main"
