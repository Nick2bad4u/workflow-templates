# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json

name: "npm Release"

run-name: >-
    ${{
        github.event_name == 'workflow_dispatch' &&
        format('npm Release {0}', inputs.version || inputs.release_type || github.run_id) ||
        format('npm Release {0}', github.ref_name || github.run_id)
    }}

concurrency:
    group: >-
        npm-release-${{ github.workflow }}-${{
            github.ref_name ||
            inputs.version ||
            inputs.release_type ||
            github.run_id
        }}
    cancel-in-progress: false

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            release_type:
                default: "patch"
                description: "Release bump type."
                options:
                    - "patch"
                    - "minor"
                    - "major"
                required: false
                type: "choice"
            version:
                description: "Explicit version (x.y.z format, overrides release_type)."
                required: false
                type: "string"

permissions: {}

jobs:
    release:
        name: "npm Release"
        permissions:
            contents: "write"
            id-token: "write"
        uses: "Nick2bad4u/workflow-templates/.github/workflows/reusable-npm-release.yml@main"
        with:
            release_type: "${{ inputs.release_type || '' }}"
            version: "${{ inputs.version || '' }}"
