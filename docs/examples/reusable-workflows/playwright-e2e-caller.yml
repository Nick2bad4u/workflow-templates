# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json

name: "Playwright End To End Tests"

run-name: "${{ github.workflow }} (${{ github.ref_name || github.run_id }})"

on:
    push:
        branches:
            - "main"
            - "master"
    pull_request:
        branches:
            - "main"
            - "master"
    merge_group:
        branches:
            - "main"
            - "master"
        types:
            - "checks_requested"
    workflow_dispatch:

concurrency:
    group: "playwright-e2e-${{ github.workflow }}-${{ github.ref || github.run_id }}"
    cancel-in-progress: true

permissions: {}

jobs:
    playwright-e2e:
        name: "Playwright End To End Tests"
        permissions:
            contents: "read"
        uses: "Nick2bad4u/workflow-templates/.github/workflows/reusable-playwright-e2e.yml@main"
        with:
            node_version_file: ".node-version"
            cache_dependency_path: "package-lock.json"
