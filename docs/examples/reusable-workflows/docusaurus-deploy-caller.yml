# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json

name: "Deploy Docusaurus"

run-name: >-
    ${{
        github.event_name == 'workflow_dispatch' &&
        format('Deploy Docusaurus manual {0}', github.run_id) ||
        format('Deploy Docusaurus {0}', github.ref_name || github.run_id)
    }}

concurrency:
    group: >-
        docusaurus-deploy-${{ github.workflow }}-${{
            github.sha ||
            github.ref ||
            github.run_id
        }}
    cancel-in-progress: true

on:
    push:
        branches:
            - "main"
            - "master"
        paths:
            - "docs/**"
            - "docusaurus.config.js"
            - "package.json"
            - "package-lock.json"
    workflow_dispatch:

permissions: {}

jobs:
    deploy:
        name: "Deploy Docusaurus"
        permissions:
            contents: "read"
            pages: "write"
            id-token: "write"
        uses: "Nick2bad4u/workflow-templates/.github/workflows/reusable-docusaurus-deploy.yml@main"
