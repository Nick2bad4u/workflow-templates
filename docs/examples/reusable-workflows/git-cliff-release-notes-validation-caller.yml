# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json

name: "Validate Git-Cliff Release Notes"

run-name: >-
    ${{
        github.event_name == 'release' &&
        format('Validate Git-Cliff Release Notes {0}', github.event.release.tag_name || github.ref_name || github.run_id) ||
        format('Validate Git-Cliff Release Notes {0}', inputs.tag || github.ref_name || github.run_id)
    }}

concurrency:
    group: >-
        git-cliff-release-notes-validation-${{ github.workflow }}-${{
            github.event.release.tag_name ||
            inputs.tag ||
            github.ref ||
            github.run_id
        }}
    cancel-in-progress: true

on:
    release:
        types:
            - "published"
            - "edited"
    workflow_dispatch:
        inputs:
            tag:
                description: "Release tag to validate, for example v1.2.3."
                required: true
                type: "string"

permissions: {}

jobs:
    validate-release-notes:
        name: "Validate Git-Cliff Release Notes"
        permissions:
            contents: "read"
        uses: "Nick2bad4u/workflow-templates/.github/workflows/reusable-git-cliff-release-notes-validation.yml@main"
        with:
            tag: "${{ github.event.release.tag_name || inputs.tag }}"
