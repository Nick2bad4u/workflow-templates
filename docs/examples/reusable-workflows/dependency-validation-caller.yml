# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json

name: "Node Dependency Validation"

run-name: "${{ github.workflow }} (${{ github.ref_name || github.run_id }})"

on:
    schedule:
        - cron: "23 9 * * 1"
    push:
        branches:
            - "main"
            - "master"
    pull_request:
        branches:
            - "main"
            - "master"
    merge_group:
        branches:
            - "main"
            - "master"
        types:
            - "checks_requested"
    workflow_dispatch:

concurrency:
    group: "dependency-validation-${{ github.workflow }}-${{ github.ref || github.run_id }}"
    cancel-in-progress: true

permissions: {}

jobs:
    dependency-validation:
        name: "Node Dependency Validation"
        permissions:
            contents: "read"
        uses: "Nick2bad4u/workflow-templates/.github/workflows/reusable-dependency-validation.yml@main"
        with:
            node_version_file: ".node-version"
            cache_dependency_path: "package-lock.json"
