# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json

name: "Repository Metrics"

run-name: "${{ github.workflow }} (${{ github.ref_name || github.run_id }})"

on:
    schedule:
        - cron: "53 4 * * *"
    workflow_dispatch:

concurrency:
    group: "repository-metrics-${{ github.workflow }}-${{ github.ref || github.run_id }}"
    cancel-in-progress: true

permissions: {}

jobs:
    repository-metrics:
        name: "Repository Metrics"
        permissions:
            contents: "read"
        uses: "Nick2bad4u/workflow-templates/.github/workflows/reusable-repository-metrics.yml@main"
