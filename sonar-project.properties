# SonarCloud project configuration
# https://sonarcloud.io/project/overview?id=Nick2bad4u_gh-runs-cleanup

sonar.projectKey=Nick2bad4u_gh-runs-cleanup
sonar.projectName=gh-runs-cleanup
sonar.projectVersion=1.0.0
sonar.organization=nick2bad4u

# Source and test directories
sonar.sources=src
sonar.tests=test

# TypeScript tsconfig (root config only — avoids discovering docs/nested configs)
sonar.typescript.tsconfigPaths=tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8

# Exclusions — skip generated output, deps, cache, and bridge re-export stubs
sonar.exclusions=\
  dist/**,\
  node_modules/**,\
  .cache/**,\
  coverage/**,\
  temp/**,\
  docs/**,\
  scripts/**,\
  src/*.js,\
  **/*.config.ts,\
  **/*.config.mjs,\
  **/*.d.mts,\
  **/*.d.ts

# Test file exclusions (keep test/ out of source analysis)
sonar.test.exclusions=\
  test/**

# Coverage — uncomment and point at your lcov report once coverage is wired up
# sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Duplication exclusions
sonar.cpd.exclusions=\
  src/*.js,\
  dist/**,\
  docs/**
