# SonarCloud project configuration
# https://sonarcloud.io/project/overview?id=Nick2bad4u_workflow-templates

sonar.projectKey=Nick2bad4u_workflow-templates
sonar.projectName=workflow-templates
sonar.projectVersion=1.0.0
sonar.organization=nick2bad4u

# Source directories
sonar.sources=.github

# Encoding
sonar.sourceEncoding=UTF-8

# Exclusions — skip generated output, deps, cache, and local temp folders
sonar.exclusions=\
  node_modules/**,\
  .cache/**,\
  temp/**

# Coverage — uncomment and point at your lcov report once coverage is wired up
# sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Duplication exclusions
sonar.cpd.exclusions=\
  .github/workflow-templates/*.properties.json
