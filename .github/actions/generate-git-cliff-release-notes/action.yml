# yaml-language-server: $schema=https://www.schemastore.org/github-action.json

name: "Generate git-cliff Release Notes"
description: "Generate release notes with a configurable command and fallback text."

inputs:
    output-path:
        description: "Release notes output path."
        required: false
        default: "temp/release-notes.md"
    command:
        description: "Shell command that writes release notes to RELEASE_NOTES_PATH."
        required: false
        default: >-
            npm run --silent changelog:release-notes -- --output "${RELEASE_NOTES_PATH}"
    fallback-text:
        description: "Text written when the command creates an empty file."
        required: false
        default: "No release notes were generated by git-cliff."
    working-directory:
        description: "Directory where the release notes command runs."
        required: false
        default: "."

outputs:
    path:
        description: "Release notes path."
        value: "${{ steps.notes.outputs.path }}"

runs:
    using: "composite"
    steps:
        - name: "Generate release notes"
          id: "notes"
          shell: "bash"
          env:
              FALLBACK_TEXT: "${{ inputs.fallback-text }}"
              RELEASE_NOTES_COMMAND: "${{ inputs.command }}"
              RELEASE_NOTES_PATH: "${{ inputs.output-path }}"
              WORKING_DIRECTORY: "${{ inputs.working-directory }}"
          run: |
              set -euo pipefail

              cd "${WORKING_DIRECTORY}"

              mkdir -p "$(dirname "${RELEASE_NOTES_PATH}")"
              bash -o pipefail -euc "${RELEASE_NOTES_COMMAND}"

              if [ ! -s "${RELEASE_NOTES_PATH}" ]; then
                printf '%s\n' "${FALLBACK_TEXT}" > "${RELEASE_NOTES_PATH}"
              fi

              echo "path=${RELEASE_NOTES_PATH}" >> "${GITHUB_OUTPUT}"
