# yaml-language-server: $schema=https://json.schemastore.org/github-action.json

name: "Validate Package Tag"
description: "Validate that a tag ref matches the package.json version."

inputs:
    tag-name:
        description: "Tag name to validate. Defaults to GITHUB_REF_NAME."
        required: false
        default: ""
    tag-prefix:
        description: "Prefix to strip before comparing to package.json."
        required: false
        default: "v"
    package-json:
        description: "Path to package.json."
        required: false
        default: "package.json"
    working-directory:
        description: "Directory containing package.json."
        required: false
        default: "."

runs:
    using: "composite"
    steps:
        - name: "Validate tag matches package version"
          shell: "bash"
          env:
              PACKAGE_JSON: "${{ inputs.package-json }}"
              TAG_NAME: "${{ inputs.tag-name }}"
              TAG_PREFIX: "${{ inputs.tag-prefix }}"
              WORKING_DIRECTORY: "${{ inputs.working-directory }}"
          run: |
              set -euo pipefail

              cd "${WORKING_DIRECTORY}"

              tag_name="${TAG_NAME:-${GITHUB_REF_NAME:-}}"
              tag_version="${tag_name#${TAG_PREFIX}}"
              package_version="$(node -e "const fs = require('node:fs'); const pkg = JSON.parse(fs.readFileSync(process.env.PACKAGE_JSON, 'utf8')); process.stdout.write(pkg.version);")"

              if [ "${tag_version}" != "${package_version}" ]; then
                echo "Tag version (${tag_version}) does not match package.json version (${package_version})." >&2
                exit 1
              fi
