name: "Dependabot Auto Merge"

run-name: >-
    ${{ github.event_name == 'pull_request' && format('Dependabot Auto Merge #{0}', github.event.pull_request.number) || format('Dependabot Auto Merge {0}', github.ref_name) }}

on:
    pull_request:
        branches: ["main"]
        types: ["opened", "synchronize", "reopened", "ready_for_review"]
    merge_group:
        branches: ["main"]
        types: ["checks_requested"]

permissions: {}

concurrency:
    group: "${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}"
    cancel-in-progress: true

defaults:
    run:
        shell: "bash"

jobs:
    enable-auto-merge:
        name: "Enable Auto-Merge"
        if: >-
            github.event_name == 'pull_request' && github.actor == 'dependabot[bot]' && github.event.pull_request.user.login == 'dependabot[bot]' && github.event.pull_request.draft == false
        runs-on: "ubuntu-latest"
        timeout-minutes: 5
        permissions:
            contents: "write"
            pull-requests: "write"

        steps:
            - name: "Fetch Dependabot Metadata"
              id: "metadata"
              uses: "dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98" # v3.1.0
              with:
                  github-token: "${{ secrets.GITHUB_TOKEN }}"

            - name: "Check Repository Auto-Merge Setting"
              shell: "bash"
              env:
                  GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
                  REPOSITORY: "${{ github.repository }}"
              run: |
                  owner="${REPOSITORY%%/*}"
                  repo="${REPOSITORY#*/}"

                  auto_merge_allowed="$(
                    gh api graphql \
                      -f owner="${owner}" \
                      -f name="${repo}" \
                      -f query="
                        query(\$owner: String!, \$name: String!) {
                          repository(owner: \$owner, name: \$name) {
                            autoMergeAllowed
                          }
                        }
                      " \
                      --jq '.data.repository.autoMergeAllowed'
                  )"

                  if [[ "${auto_merge_allowed}" != "true" ]]; then
                    echo "::error::Repository auto-merge is disabled. Enable Settings > General > Pull Requests > Allow auto-merge."
                    exit 1
                  fi

            - name: "Enable Auto-Merge"
              if: >-
                  contains(
                    fromJSON('["version-update:semver-patch","version-update:semver-minor","version-update:semver-major"]'),
                    steps.metadata.outputs.update-type
                  )
              shell: "bash"
              env:
                  GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
                  PR_URL: "${{ github.event.pull_request.html_url }}"
              run: |
                  if ! gh pr merge --auto --squash "${PR_URL}"; then
                    echo "::error::Failed to enable auto-merge. Check repository auto-merge, branch protection, merge method settings, and token permissions."
                    exit 1
                  fi

    merge-group-status:
        name: "Merge Group Status"
        if: "github.event_name == 'merge_group'"
        runs-on: "ubuntu-latest"
        timeout-minutes: 1

        steps:
            - name: "Report Status"
              shell: "bash"
              run: |
                  echo "Dependabot auto-merge is skipped for merge queue events."
