name: Continuous Integration

run-name: Continuous Integration • ${{ github.ref_name }} @${{ github.actor }}

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

on:
    push:
        branches:
            - main
    pull_request:
    merge_group:
        types:
            - checks_requested

jobs:
    test:
        name: Test (${{ matrix.label }})
        runs-on: ${{ matrix.os }}
        timeout-minutes: 60
        permissions:
            contents: read
            id-token: write
        strategy:
            fail-fast: true
            matrix:
                include:
                    - label: linux
                      os: ubuntu-latest
                      codecov_flag: os-linux
                    - label: windows
                      os: windows-latest
                      codecov_flag: os-windows
                    - label: macos
                      os: macos-latest
                      codecov_flag: os-macos
        defaults:
            run:
                shell: bash
        env:
            CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

        steps:
            - name: Harden the runner (Audit all outbound calls)
              if: ${{ matrix.os == 'ubuntu-latest' }}
              uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
              with:
                  egress-policy: audit

            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Node.js
              uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
              with:
                  node-version-file: .node-version
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Install dependencies
              run: npm ci --force

            - name: Build package
              run: npm run build

            - name: Upload bundle analysis to Codecov
              if: ${{ matrix.os == 'ubuntu-latest' && !cancelled() && env.CODECOV_TOKEN != '' }}
              run: npx @codecov/bundle-analyzer ./dist --bundle-name=${{ github.repository }} --upload-token="${CODECOV_TOKEN}"
              env:
                  GITHUB_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
                  GITHUB_REF: ${{ github.event_name == 'pull_request' && format('refs/heads/{0}', github.head_ref) || github.ref }}

            - name: Verify README rules table sync
              run: npm run sync:readme-rules-table

            - name: Typecheck
              run: npm run typecheck

            - name: Run tests with coverage and JUnit report
              run: npx vitest run --coverage --reporter=github-actions --reporter=dot --reporter=junit --outputFile=test-report.junit.xml --silent
              env:
                  CI: "true"
                  MAX_THREADS: "1"
                  TYPEFEST_VITEST_HANGING_PROCESS_REPORTER: "true"
                  VITEST_HANGING_PROCESS_REPORTER: "true"

            - name: Verify coverage artifact
              run: python -c "from pathlib import Path; assert Path('coverage/lcov.info').is_file(), 'coverage/lcov.info was not generated'"

            - name: Verify JUnit artifact
              run: python -c "from pathlib import Path; assert Path('test-report.junit.xml').is_file(), 'test-report.junit.xml was not generated'"

            - name: Upload test results to Codecov
              if: ${{ !cancelled() }}
              uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
              with:
                  use_oidc: true
                  slug: ${{ github.repository }}
                  files: test-report.junit.xml
                  flags: ${{ matrix.codecov_flag }}
                  name: vitest-junit-${{ matrix.codecov_flag }}
                  report_type: test_results
                  fail_ci_if_error: true
                  disable_search: true
                  verbose: true

            - name: Upload coverage to Codecov
              if: ${{ !cancelled() }}
              uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
              with:
                  use_oidc: true
                  slug: ${{ github.repository }}
                  files: ./coverage/lcov.info
                  flags: ${{ matrix.codecov_flag }}
                  name: vitest-unit-coverage-${{ matrix.codecov_flag }}
                  report_type: coverage
                  fail_ci_if_error: true
                  disable_search: true
                  verbose: true

    eslint9-compat:
        name: ESLint 9 Compatibility (${{ matrix.label }})
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: read
        strategy:
            fail-fast: true
            matrix:
                include:
                    - eslint-js-version: 9.0.0
                      eslint-version: 9.0.0
                      label: 9.0.0
                    - eslint-js-version: ^9.39.1
                      eslint-version: ^9.39.1
                      label: 9.latest
        defaults:
            run:
                shell: bash

        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
              with:
                  egress-policy: audit

            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Node.js
              uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
              with:
                  cache: npm
                  cache-dependency-path: package-lock.json
                  node-version-file: .node-version

            - name: Install dependencies
              run: npm ci --force

            - name: Build package
              run: npm run build

            - name: Install ESLint 9 runtime for compatibility smoke checks
              run: npm install --no-save --force eslint@${{ matrix.eslint-version }} @eslint/js@${{ matrix.eslint-js-version }}

            - name: Run ESLint 9 compatibility smoke checks
              run: npm run lint:compat:eslint9 -- --expect-eslint-major=9
