# This is a Dependabot configuration file for automating dependency updates.
# The configuration is set to version 2 of the Dependabot schema.
# yaml-language-server: $schema=https://www.schemastore.org/dependabot-2.0.json
version: 2

multi-ecosystem-groups:
    dependabot-all:
        schedule:
            interval: "monthly"
            time: "05:30"
            timezone: "America/Detroit"
        assignees:
            - "Nick2bad4u"
        target-branch: "main"
        commit-message:
            prefix: "[dependabot][all]"
            prefix-development: "[dependabot][dev][all]"
            include: "scope"
        labels:
            - "dependabot"
            - "dependencies"

updates:
    - package-ecosystem: "github-actions"
      cooldown:
          default-days: 3
          include: ["*"]
      directory: "/"
      allow:
          # Allow both direct and indirect updates for all packages
          - dependency-type: "all"
      labels:
          - "github-actions"
      multi-ecosystem-group: "dependabot-all"
      rebase-strategy: "auto"
      patterns:
          - "*"

    - package-ecosystem: "npm"
      cooldown:
          default-days: 3
          include: ["*"]
      directory: "/"
      rebase-strategy: "auto"
      versioning-strategy: "increase"
      allow:
          # Allow both direct and indirect updates for all packages
          - dependency-type: "all"
      labels:
          - "npm"
      multi-ecosystem-group: "dependabot-all"
      patterns:
          - "*"
