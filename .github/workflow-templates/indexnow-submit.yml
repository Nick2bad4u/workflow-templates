name: "Submit IndexNow Notification"

on:
    workflow_dispatch:
        inputs:
            submission_mode:
                default: "delta"
                description: "Submit only changed URLs (delta) or full sitemap?"
                options:
                    - "delta"
                    - "sitemap"
                required: true
                type: "choice"
            base_ref:
                default: ""
                description: "Optional git ref for delta base (defaults to HEAD^)"
                required: false
                type: "string"
            head_ref:
                default: ""
                description: "Optional git ref for delta head (defaults to HEAD)"
                required: false
                type: "string"

concurrency:
    group: "indexnow-submit"
    cancel-in-progress: false

permissions:
    contents: "read"
    id-token: "write"

jobs:
    submit:
        name: "Submit to IndexNow"
        runs-on: "ubuntu-latest"
        timeout-minutes: 60
        env:
            INDEXNOW_KEY: "${{ secrets.INDEXNOW_KEY }}"
        steps:
            - name: "Harden runner"
              uses: "step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450" # v2.19.1
              with:
                  egress-policy: "audit"

            - name: "Validate IndexNow secret"
              run: |
                  if [ -z "${INDEXNOW_KEY}" ]; then
                    echo "::error title=Missing INDEXNOW_KEY::Set INDEXNOW_KEY repository secret"
                    exit 1
                  fi

            - name: "Checkout"
              uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
              with:
                  fetch-depth: 0

            - name: "Setup Node"
              uses: "actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e" # v6.4.0
              with:
                  node-version-file: ".node-version"
                  cache: "npm"
                  cache-dependency-path: "package-lock.json"

            - name: "Install dependencies"
              run: "npm ci"

            - name: "Build site (delta mode)"
              if: "inputs.submission_mode == 'delta'"
              run: "npm run docs:build --if-present"

            - name: "Submit changed URLs to IndexNow"
              if: "inputs.submission_mode == 'delta'"
              env:
                  BASE_REF: "${{ inputs.base_ref || '' }}"
                  HEAD_REF: "${{ inputs.head_ref || '' }}"
              run: |
                  if [ -z "${BASE_REF}" ]; then
                    BASE_REF=$(git rev-parse HEAD^ 2>/dev/null || echo '0000000000000000000000000000000000000000')
                  fi
                  if [ -z "${HEAD_REF}" ]; then
                    HEAD_REF=$(git rev-parse HEAD)
                  fi

                  echo "Submitting changed URLs from ${BASE_REF} to ${HEAD_REF}"
                  # Add your IndexNow submission script here
                  # Example: node scripts/submit-indexnow.js --base ${BASE_REF} --head ${HEAD_REF}

            - name: "Submit full sitemap to IndexNow"
              if: "inputs.submission_mode == 'sitemap'"
              run: |
                  echo "Submitting full sitemap to IndexNow"
                  # Add your IndexNow sitemap submission script here
                  # Example: node scripts/submit-indexnow.js --mode sitemap
