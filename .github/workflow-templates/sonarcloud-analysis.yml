# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json

name: "Sonar Cloud Analysis"

run-name: "${{ github.workflow }} (${{ github.ref_name || github.run_id }})"

on:
    push:
        branches:
            - "$default-branch"
    pull_request:
        branches:
            - "$default-branch"
    merge_group:
        branches:
            - "$default-branch"
        types:
            - "checks_requested"
    workflow_dispatch:
        inputs:
            node_version_file:
                default: ".node-version"
                description: "Node version file used by actions/setup-node."
                required: false
                type: "string"
            cache_dependency_path:
                default: "package-lock.json"
                description: "Dependency lockfile path used for npm cache keys."
                required: false
                type: "string"

concurrency:
    group: "sonarcloud-analysis-${{ github.workflow }}-${{ github.ref }}"
    cancel-in-progress: true

permissions:
    contents: "read"

defaults:
    run:
        shell: "bash"

jobs:
    sonarcloud:
        name: "SonarCloud Code Quality Analysis"
        runs-on: "ubuntu-latest"
        timeout-minutes: 30
        env:
            SONAR_TOKEN: "${{ secrets.SONAR_TOKEN }}"
        steps:
            - name: "Harden runner"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            - name: "Checkout"
              uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
              with:
                  fetch-depth: 0

            - name: "Setup Node"
              uses: "actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e" # v6.4.0
              with:
                  node-version-file: "${{ inputs.node_version_file }}"
                  cache: "npm"
                  cache-dependency-path: "${{ inputs.cache_dependency_path }}"

            - name: "Install dependencies"
              run: "npm ci --no-audit --no-fund"

            - name: "Build"
              run: "npm run build --if-present"

            - name: "Run coverage"
              run: "npm run test:coverage --if-present"

            - name: "Skip SonarCloud scan without token"
              if: "${{ env.SONAR_TOKEN == '' }}"
              run: "echo '::warning::SONAR_TOKEN is not available. Skipping SonarCloud scan.'"

            - name: "SonarCloud scan"
              if: "${{ env.SONAR_TOKEN != '' }}"
              uses: "SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e" # v8.2.0
              env:
                  GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
                  SONAR_TOKEN: "${{ env.SONAR_TOKEN }}"
