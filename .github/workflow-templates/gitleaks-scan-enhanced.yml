name: "Gitleaks Secret Scan"

on:
    pull_request:
    merge_group:
        types:
            - "checks_requested"
    push:
    schedule:
        - cron: "12 4 * * *"
    workflow_dispatch:

concurrency:
    group: "gitleaks-${{ github.workflow }}-${{ github.ref }}"
    cancel-in-progress: true

permissions:
    contents: "read"

jobs:
    scan:
        name: "Gitleaks Secret Scan"
        runs-on: "ubuntu-latest"
        timeout-minutes: 20
        steps:
            - name: "Harden runner"
              uses: "step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450" # v2.19.1
              with:
                  egress-policy: "audit"

            - name: "Checkout"
              uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
              with:
                  fetch-depth: 0

            - name: "Setup Node"
              uses: "actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e" # v6.4.0
              with:
                  node-version: "24"

            - name: "Install shared Gitleaks config"
              shell: "bash"
              run: |
                  set -euo pipefail

                  shared_config_path="node_modules/gitleaks-config-nick2bad4u/gitleaks.toml"

                  if ! grep -Fq "${shared_config_path}" .gitleaks.toml; then
                    echo "No shared npm Gitleaks config reference found in .gitleaks.toml."
                    exit 0
                  fi

                  if [[ -f package-lock.json ]]; then
                    npm ci --ignore-scripts --no-audit --no-fund
                  elif [[ -f package.json ]]; then
                    npm install --ignore-scripts --no-audit --no-fund
                  else
                    echo "::error title=Missing npm manifest::.gitleaks.toml extends ${shared_config_path}, but package.json was not found."
                    exit 1
                  fi

                  if [[ ! -f "${shared_config_path}" ]]; then
                    echo "::error title=Missing shared Gitleaks config::Expected ${shared_config_path} after installing npm dependencies."
                    exit 1
                  fi

            - name: "Run Gitleaks scan"
              uses: "gitleaks/gitleaks-action@5425999620c418539c61a8143f29e346d5f6cf08" # v2.2.0
              env:
                  GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
                  GITLEAKS_CONFIG: ".gitleaks.toml"
