# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json

name: "Prettier Check"

run-name: "${{ github.workflow }} (${{ github.ref_name || github.run_id }})"

on:
    push:
        branches:
            - "$default-branch"
    pull_request:
        branches:
            - "$default-branch"
    merge_group:
        branches:
            - "$default-branch"
        types:
            - "checks_requested"
    workflow_dispatch:

concurrency:
    group: "prettier-check-${{ github.workflow }}-${{ github.ref }}"
    cancel-in-progress: true

permissions:
    contents: "read"

defaults:
    run:
        shell: "bash"

jobs:
    prettier:
        name: "Prettier Check"
        runs-on: "ubuntu-latest"
        timeout-minutes: 20
        steps:
            - name: "Harden runner"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            - name: "Checkout"
              uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0

            - name: "Setup Node"
              uses: "actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e" # v6.4.0
              with:
                  node-version: "24"
                  cache: "npm"
                  cache-dependency-path: "package-lock.json"

            - name: "Install dependencies"
              run: "npm ci --no-audit --no-fund"

            - name: "Run Prettier"
              run: "npx prettier . --check"
