name: "npm Release"

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            release_type:
                description: "Release bump type"
                required: true
                default: "patch"
                type: "choice"
                options:
                    - "patch"
                    - "minor"
                    - "major"
            version:
                description: "Explicit version (x.y.z format, overrides release_type)"
                required: false
                type: "string"

concurrency:
    group: "npm-release"
    cancel-in-progress: false

permissions:
    contents: "write"
    id-token: "write"

defaults:
    run:
        shell: "bash"

jobs:
    publish:
        name: "Publish to npm"
        if: "${{ github.event_name != 'push' || github.actor != 'github-actions[bot]' }}"
        runs-on: "ubuntu-latest"
        timeout-minutes: 30
        steps:
            - name: "Harden runner"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            - name: "Checkout"
              uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
              with:
                  fetch-depth: 0
                  fetch-tags: true

            - name: "Setup Node"
              uses: "actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e" # v6.4.0
              with:
                  node-version-file: ".node-version"
                  registry-url: "https://registry.npmjs.org"
                  cache: "npm"
                  cache-dependency-path: "package-lock.json"

            - name: "Install dependencies"
              run: "npm ci"

            - name: "Configure Git"
              if: "github.event_name == 'workflow_dispatch'"
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - name: "Determine version"
              id: "version"
              env:
                  EXPLICIT_VERSION: "${{ inputs.version }}"
                  RELEASE_TYPE: "${{ inputs.release_type }}"
              run: |
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    if [ -n "${EXPLICIT_VERSION}" ]; then
                      npm version "${EXPLICIT_VERSION}" --no-git-tag-version
                      version="${EXPLICIT_VERSION}"
                    else
                      npm version "${RELEASE_TYPE:-patch}" --no-git-tag-version
                      version=$(node -p "require('./package.json').version")
                    fi
                  else
                    version="${GITHUB_REF_NAME#v}"
                  fi
                  echo "version=${version}" >> "$GITHUB_OUTPUT"
                  echo "tag=v${version}" >> "$GITHUB_OUTPUT"

            - name: "Build"
              run: "npm run build --if-present"

            - name: "Verify package"
              run: "npm run release:check --if-present || npm test"

            - name: "Publish to npm"
              run: "npm publish --access public --provenance"
              env:
                  NODE_AUTH_TOKEN: "${{ secrets.NPM_TOKEN }}"

            - name: "Create GitHub release"
              uses: "actions/create-release@0cb9c9b65d5d1901c1f53e5e66eaf4afd303e70e" # v1
              env:
                  GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
              with:
                  tag_name: "${{ steps.version.outputs.tag }}"
                  release_name: "Release ${{ steps.version.outputs.tag }}"
                  draft: false
                  prerelease: false
