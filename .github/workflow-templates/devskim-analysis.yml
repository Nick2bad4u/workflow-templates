# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json

name: "Dev Skim Security Analysis"

run-name: "${{ github.workflow }} (${{ github.ref_name || github.run_id }})"

on:
    schedule:
        - cron: "37 1 * * 2"
    push:
        branches:
            - "$default-branch"
    pull_request:
        branches:
            - "$default-branch"
    merge_group:
        branches:
            - "$default-branch"
        types:
            - "checks_requested"
    workflow_dispatch:

concurrency:
    group: "devskim-analysis-${{ github.workflow }}-${{ github.ref }}"
    cancel-in-progress: true

permissions:
    actions: "read"
    contents: "read"
    security-events: "write"

jobs:
    devskim:
        name: "DevSkim"
        runs-on: "ubuntu-latest"
        timeout-minutes: 30
        steps:
            - name: "Harden runner"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            - name: "Checkout"
              uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0

            - name: "Run DevSkim scanner"
              uses: "microsoft/DevSkim-Action@4b5047945a44163b94642a1cecc0d93a3f428cc6" # v1.0.16
              with:
                  directory-to-scan: "."
                  should-scan-archives: false
                  output-filename: "devskim-results.sarif"
                  output-directory: "."
                  ignore-globs: "**/.git/**,**/bin/**,**/dist/**,**/node_modules/**"

            - name: "Upload DevSkim SARIF artifact"
              uses: "actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a" # v7.0.1
              with:
                  name: "devskim-results"
                  path: "devskim-results.sarif"

            - name: "Upload DevSkim SARIF"
              uses: "github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e" # v4.36.2
              with:
                  sarif_file: "devskim-results.sarif"
