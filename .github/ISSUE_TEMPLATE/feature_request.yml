name: "Feature request"
description: "Suggest an enhancement for workflow templates in this repository"
title: "[Feature]: "
labels:
    - "enhancement"
body:
    - type: "textarea"
      id: "problem"
      attributes:
          label: "Problem statement"
          description: "What workflow problem are you trying to solve?"
      validations:
          required: true

    - type: "textarea"
      id: "proposed"
      attributes:
          label: "Proposed solution"
          description: "Describe the workflow template behavior and expected outcome."
      validations:
          required: true

    - type: "textarea"
      id: "alternatives"
      attributes:
          label: "Alternatives considered"

    - type: "textarea"
      id: "extra"
      attributes:
          label: "Additional context"
