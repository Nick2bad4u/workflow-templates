name: Bug report
description: Report a reproducible bug in gh-runs-cleanup
title: "[Bug]: "
labels:
    - bug
body:
    - type: textarea
      id: summary
      attributes:
          label: Summary
          description: What went wrong?
      validations:
          required: true

    - type: textarea
      id: steps
      attributes:
          label: Steps to reproduce
          description: Include exact command(s) and flags used.
          placeholder: |
              1. gh runs-cleanup --repo owner/repo ...
              2. ...
      validations:
          required: true

    - type: textarea
      id: expected
      attributes:
          label: Expected behavior
      validations:
          required: true

    - type: textarea
      id: actual
      attributes:
          label: Actual behavior
      validations:
          required: true

    - type: input
      id: extension-version
      attributes:
          label: Extension version
          placeholder: 0.1.0

    - type: input
      id: gh-version
      attributes:
          label: gh CLI version
          placeholder: gh version 2.x
      validations:
          required: true

    - type: input
      id: node-version
      attributes:
          label: Node.js version
          placeholder: node -v output
      validations:
          required: true

    - type: textarea
      id: additional
      attributes:
          label: Additional context
          description: Any logs, JSON output, or screenshots.
