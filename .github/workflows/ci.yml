name: Continuous Integration

run-name: >-
    Continuous Integration • ${{ github.event_name }} •
    ${{ github.event.pull_request.number || github.ref_name || github.sha }}

on:
    push:
        branches:
            - main
    pull_request:
    merge_group:
        types:
            - checks_requested

concurrency:
    group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    validate:
        name: Validate repository
        runs-on: ubuntu-latest
        timeout-minutes: 15
        defaults:
            run:
                shell: bash
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: .node-version
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Check generated schema is up to date
              run: npm run schema:check:workflow-template-properties

            - name: Validate schema fixtures
              run: npm run schema:test:workflow-template-properties

            - name: Lint repository
              run: npm run lint

            - name: Lint workflow syntax with actionlint
              uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
              with:
                  fail_level: error

            - name: Verify workflow template metadata files
              run: |
                  set -euo pipefail
                  shopt -s nullglob
                  for workflow in .github/workflow-templates/*.yml; do
                    base="${workflow%.yml}"
                    props="${base}.properties.json"
                    if [ ! -f "$props" ]; then
                      echo "Missing template metadata file: $props" >&2
                      exit 1
                    fi
                  done
