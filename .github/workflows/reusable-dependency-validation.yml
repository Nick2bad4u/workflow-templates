# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json

name: "Node Dependency Validation"

on:
    workflow_call:
        inputs:
            node_version_file:
                default: ".node-version"
                description: "Node version file used by actions/setup-node."
                required: false
                type: "string"
            cache_dependency_path:
                default: "package-lock.json"
                description: "Dependency lockfile path used for npm cache keys."
                required: false
                type: "string"

permissions:
    contents: "read"

jobs:
    dependency-validation:
        name: "Validate Dependencies"
        runs-on: "ubuntu-latest"
        timeout-minutes: 60
        env:
            NODE_OPTIONS: "--max_old_space_size=8192"
        steps:
            - name: "Harden runner"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            - name: "Checkout"
              uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
              with:
                  fetch-depth: 0

            - name: "Setup Node"
              uses: "actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e" # v6.4.0
              with:
                  node-version-file: "${{ inputs.node_version_file }}"
                  cache: "npm"
                  cache-dependency-path: "${{ inputs.cache_dependency_path }}"

            - name: "Install dependencies"
              run: "npm ci --no-audit --no-fund"

            - name: "Run validation command"
              run: "npm run release:verify --if-present"

            - name: "Collect diagnostics"
              if: "failure()"
              run: |
                  mkdir -p artifacts/dependency-validation
                  node --version > artifacts/dependency-validation/node-version.txt
                  npm --version > artifacts/dependency-validation/npm-version.txt
                  git status --short > artifacts/dependency-validation/git-status.txt
                  npm ls --all > artifacts/dependency-validation/npm-ls.txt 2>&1 || true

            - name: "Upload dependency validation diagnostics"
              if: "failure()"
              uses: "actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a" # v7.0.1
              with:
                  name: "dependency-validation-diagnostics"
                  path: "artifacts/dependency-validation/**"
                  if-no-files-found: "error"
                  include-hidden-files: true
