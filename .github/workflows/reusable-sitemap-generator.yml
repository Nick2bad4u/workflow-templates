# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json

name: "Generate XML Sitemap"

on:
    workflow_call:
        inputs:
            base_url_path:
                default: "https://example.com/"
                description: "Canonical base URL for sitemap entries."
                required: false
                type: "string"

permissions:
    contents: "write"
    pull-requests: "write"

jobs:
    sitemap:
        name: "Generate Sitemap"
        runs-on: "ubuntu-latest"
        timeout-minutes: 20
        steps:
            - name: "Harden runner"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            - name: "Checkout"
              uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
              with:
                  fetch-depth: 0

            - name: "Generate sitemap"
              id: "sitemap"
              uses: "cicirello/generate-sitemap@6a56a20238e631d653600cf792c3596722b78259" # v1.10.4
              with:
                  base-url-path: "${{ inputs.base_url_path }}"
                  additional-extensions: "doc docx ppt pptx js css json xml xlsx xls pdf md markdown txt yaml yml png"

            - name: "Output sitemap stats"
              run: |
                  echo "sitemap-path = ${{ steps.sitemap.outputs.sitemap-path }}"
                  echo "url-count = ${{ steps.sitemap.outputs.url-count }}"
                  echo "excluded-count = ${{ steps.sitemap.outputs.excluded-count }}"

            - name: "Create sitemap pull request"
              uses: "peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1" # v8.1.1
              with:
                  title: "chore: update sitemap"
                  body: "Automated sitemap update."
                  branch: "chore/update-sitemap"
                  token: "${{ secrets.GITHUB_TOKEN }}"
