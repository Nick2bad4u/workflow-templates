# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json

name: "Ps Secret Scanner Secret Scan"

on:
    workflow_call:

permissions:
    contents: "read"

defaults:
    run:
        shell: "bash"

jobs:
    pssecret-scanner:
        name: "Run PSSecretScanner"
        runs-on: "ubuntu-latest"
        timeout-minutes: 30
        steps:
            - name: "Harden runner"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            - name: "Checkout"
              uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0

            - name: "Install PSSecretScanner"
              shell: "pwsh"
              run: "Install-Module -Name PSSecretScanner -Force -Scope CurrentUser"

            - name: "Create default ignore file"
              shell: "bash"
              run: |
                  if [ ! -f .ignoresecrets ]; then
                    printf '%s\n' 'CHANGELOG.md' 'CNAME' > .ignoresecrets
                  fi

            - name: "Run PSSecretScanner"
              shell: "pwsh"
              run: |
                  Import-Module PSSecretScanner
                  $results = if (Test-Path .ignoresecrets) {
                    Find-Secret -Path . -Excludelist .ignoresecrets
                  } else {
                    Find-Secret -Path .
                  }
                  $results | Format-Table | Out-String | Write-Host
                  if ($results) {
                    Write-Error 'Secrets found.'
                    exit 1
                  }
                  Write-Host 'No secrets found.'
