name: npm Release

on:
    workflow_call:
        inputs:
            release_type:
                description: Optional release bump type. Leave empty when publishing from an existing tag.
                required: false
                type: string
            version:
                description: Explicit version (x.y.z format, overrides release_type).
                required: false
                type: string
        secrets:
            NPM_TOKEN:
                description: Optional npm automation token. Trusted publishing may not need this.
                required: false
concurrency:
    group: npm-release
    cancel-in-progress: false

permissions:
    contents: write
    id-token: write

defaults:
    run:
        shell: bash

jobs:
    publish:
        name: Publish to npm
        if: ${{ github.event_name != 'push' || github.actor != 'github-actions[bot]' }}
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0
                  fetch-tags: true

            - name: Setup Node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: .node-version
                  registry-url: https://registry.npmjs.org
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Configure Git
              if: inputs.version != '' || inputs.release_type != ''
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - name: Determine version
              id: version
              env:
                  EXPLICIT_VERSION: ${{ inputs.version }}
                  RELEASE_TYPE: ${{ inputs.release_type }}
              run: |
                  if [ -n "${EXPLICIT_VERSION}" ] || [ -n "${RELEASE_TYPE}" ]; then
                    if [ -n "${EXPLICIT_VERSION}" ]; then
                      npm version "${EXPLICIT_VERSION}" --no-git-tag-version
                      version="${EXPLICIT_VERSION}"
                    else
                      npm version "${RELEASE_TYPE:-patch}" --no-git-tag-version
                      version=$(node -p "require('./package.json').version")
                    fi
                  else
                    version="${GITHUB_REF_NAME#v}"
                  fi
                  echo "version=${version}" >> "$GITHUB_OUTPUT"
                  echo "tag=v${version}" >> "$GITHUB_OUTPUT"

            - name: Build
              run: npm run build --if-present

            - name: Verify package
              run: npm run release:check --if-present || npm test

            - name: Publish to npm
              run: npm publish --access public --provenance
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Create GitHub release
              uses: actions/create-release@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: ${{ steps.version.outputs.tag }}
                  release_name: Release ${{ steps.version.outputs.tag }}
                  draft: false
                  prerelease: false
