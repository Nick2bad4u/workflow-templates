# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json

name: "Node.js Test & Coverage"

on:
    workflow_call:
        secrets:
            CODECOV_TOKEN:
                description: "Optional Codecov token for private repositories or token-required uploads."
                required: false
concurrency:
    group: "node-test-${{ github.workflow }}-${{ github.ref }}"
    cancel-in-progress: true

permissions:
    contents: "read"
    id-token: "write"

jobs:
    test:
        name: "Test (${{ matrix.label }})"
        runs-on: "${{ matrix.os }}"
        timeout-minutes: 60
        strategy:
            fail-fast: false
            matrix:
                include:
                    - label: "linux"
                      os: "ubuntu-latest"
                      codecov_flag: "os-linux"
                    - label: "windows"
                      os: "windows-latest"
                      codecov_flag: "os-windows"
                    - label: "macos"
                      os: "macos-latest"
                      codecov_flag: "os-macos"
        defaults:
            run:
                shell: "bash"
        env:
            CI: "true"
            CODECOV_TOKEN: "${{ secrets.CODECOV_TOKEN }}"

        steps:
            - name: "Harden runner (Ubuntu only)"
              if: "${{ matrix.os == 'ubuntu-latest' }}"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            - name: "Checkout"
              uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6.0.3

            - name: "Setup Node"
              uses: "actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e" # v6.4.0
              with:
                  node-version-file: ".node-version"
                  cache: "npm"
                  cache-dependency-path: "package-lock.json"

            - name: "Install dependencies"
              run: "npm ci --force"

            - name: "Build"
              run: "npm run build --if-present"

            - name: "Typecheck"
              run: "npm run typecheck --if-present"

            - name: "Run tests with coverage"
              run: "npm test --if-present"

            - name: "Upload coverage to Codecov"
              if: "${{ !cancelled() && matrix.os == 'ubuntu-latest' && env.CODECOV_TOKEN != '' }}"
              uses: "codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f" # v7.0.0
              with:
                  use_oidc: true
                  slug: "${{ github.repository }}"
                  flags: "${{ matrix.codecov_flag }}"
                  name: "coverage-${{ matrix.codecov_flag }}"
                  fail_ci_if_error: false
