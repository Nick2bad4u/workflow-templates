name: Node.js Test & Coverage

on:
    workflow_call:
        secrets:
            CODECOV_TOKEN:
                description: Optional Codecov token for private repositories or token-required uploads.
                required: false
concurrency:
    group: node-test-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    id-token: write

jobs:
    test:
        name: Test (${{ matrix.label }})
        runs-on: ${{ matrix.os }}
        timeout-minutes: 60
        strategy:
            fail-fast: false
            matrix:
                include:
                    - label: linux
                      os: ubuntu-latest
                      codecov_flag: os-linux
                    - label: windows
                      os: windows-latest
                      codecov_flag: os-windows
                    - label: macos
                      os: macos-latest
                      codecov_flag: os-macos
        defaults:
            run:
                shell: bash
        env:
            CI: "true"
            CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

        steps:
            - name: Harden runner (Ubuntu only)
              if: ${{ matrix.os == 'ubuntu-latest' }}
              uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: .node-version
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Install dependencies
              run: npm ci --force

            - name: Build
              run: npm run build --if-present

            - name: Typecheck
              run: npm run typecheck --if-present

            - name: Run tests with coverage
              run: npm test --if-present

            - name: Upload coverage to Codecov
              if: ${{ !cancelled() && matrix.os == 'ubuntu-latest' && env.CODECOV_TOKEN != '' }}
              uses: codecov/codecov-action@7dbc3d660cd3a8b14fde4aa59d0428df5b2c8e13 # v5.10.0
              with:
                  use_oidc: true
                  slug: ${{ github.repository }}
                  flags: ${{ matrix.codecov_flag }}
                  name: coverage-${{ matrix.codecov_flag }}
                  fail_ci_if_error: false
