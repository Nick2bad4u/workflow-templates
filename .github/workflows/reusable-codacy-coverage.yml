# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json

name: "Codacy Coverage Upload"

on:
    workflow_call:
        inputs:
            node_version_file:
                default: ".node-version"
                description: "Node version file used by actions/setup-node."
                required: false
                type: "string"
            cache_dependency_path:
                default: "package-lock.json"
                description: "Dependency lockfile path used for npm cache keys."
                required: false
                type: "string"
        secrets:
            CODACY_PROJECT_TOKEN:
                description: "Codacy project token."
                required: true
            CODACY_API_TOKEN:
                description: "Codacy API token."
                required: false

permissions:
    contents: "read"

jobs:
    codacy-coverage:
        name: "Upload Codacy Coverage"
        runs-on: "ubuntu-latest"
        timeout-minutes: 60
        steps:
            - name: "Harden runner"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            - name: "Checkout"
              uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
              with:
                  fetch-depth: 0

            - name: "Setup Node"
              uses: "actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e" # v6.4.0
              with:
                  node-version-file: "${{ inputs.node_version_file }}"
                  cache: "npm"
                  cache-dependency-path: "${{ inputs.cache_dependency_path }}"

            - name: "Install dependencies"
              run: "npm ci --no-audit --no-fund"

            - name: "Build"
              run: "npm run build --if-present"

            - name: "Run coverage"
              run: "npm run test:coverage --if-present"

            - name: "Upload Codacy coverage"
              uses: "codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699" # v1.3.0
              with:
                  project-token: "${{ secrets.CODACY_PROJECT_TOKEN }}"
                  api-token: "${{ secrets.CODACY_API_TOKEN }}"
                  coverage-reports: "./coverage/lcov.info"
