# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
name: "Trufflehog Secret Scan"

on:
    workflow_call:
concurrency:
    group: "trufflehog-${{ github.workflow }}-${{ github.ref }}"
    cancel-in-progress: true

permissions:
    contents: "read"

jobs:
    scan:
        name: "Secret Scanning"
        runs-on: "ubuntu-latest"
        timeout-minutes: 20
        steps:
            - name: "Harden runner"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            - name: "Checkout"
              uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6.0.3
              with:
                  fetch-depth: 0

            - name: "Run Trufflehog scan"
              uses: "trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51" # v3.95.5
              with:
                  path: "."
                  base: ""
                  head: "${{ github.ref_name }}"
                  # Only fail the job for VERIFIED secrets.
                  # Unverified/unknown results are often high-noise in OSS repos
                  # (example strings, docs, placeholder tokens) and already
                  # covered by other scanners (gitleaks, etc.).
                  extra_args: "--results=verified --exclude-detectors=URI"
              env:
                  GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
