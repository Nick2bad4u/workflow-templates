# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json

name: "Virus Total Release Asset Scan"

on:
    workflow_call:
        inputs:
            file_name:
                default: "*"
                description: "Release asset glob passed to release-downloader."
                required: false
                type: "string"
        secrets:
            VT_API_KEY:
                description: "VirusTotal API key."
                required: true

permissions:
    contents: "read"

jobs:
    virustotal:
        name: "VirusTotal Scan"
        if: "github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'"
        runs-on: "ubuntu-latest"
        timeout-minutes: 20
        steps:
            - name: "Harden runner"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            - name: "Download release assets"
              uses: "robinraju/release-downloader@28fc21f50d76778e7023361aa1f863e717d3d56f" # v1.13
              with:
                  latest: true
                  fileName: "${{ inputs.file_name || '*' }}"
                  out-file-path: "release-dist"
                  token: "${{ secrets.GITHUB_TOKEN }}"

            - name: "VirusTotal scan"
              uses: "crazy-max/ghaction-virustotal@936d8c5c00afe97d3d9a1af26d017cfdf26800a2" # v5.0.0
              with:
                  vt_api_key: "${{ secrets.VT_API_KEY }}"
                  files: |
                      release-dist/*
                      release-dist/**/*
