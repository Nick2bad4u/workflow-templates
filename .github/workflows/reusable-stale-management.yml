name: Stale Issues & Pull Requests

on:
    workflow_call:
concurrency:
    group: stale-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    issues: write
    pull-requests: write

jobs:
    stale:
        name: Mark Stale Items
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Mark stale issues and pull requests
              uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10.3.0
              with:
                  repo-token: ${{ secrets.GITHUB_TOKEN }}
                  stale-issue-message: Issue marked stale due to inactivity
                  stale-pr-message: Pull request marked stale due to inactivity
                  stale-issue-label: no-activity
                  stale-pr-label: no-activity
                  days-before-stale: 60
                  days-before-close: 14
